name: Release Builds
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            use_cross: true
            artifact_name: env_guard_app-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            use_cross: true
            artifact_name: env_guard_app-linux-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            use_cross: false
            artifact_name: env_guard_app-windows-x86_64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-2022
            use_cross: false
            artifact_name: env_guard_app-windows-aarch64.exe
          - target: universal-apple-darwin
            os: macos-14
            use_cross: false
            artifact_name: env_guard_app-macos-universal
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin' || matrix.target }}
      - name: Install macOS targets
        if: matrix.target == 'universal-apple-darwin'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Install Perl
        if: runner.os == 'Linux'
        run: sudo apt-get install -y perl
      - name: Install NASM
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}
      - name: Build native
        if: "!matrix.use_cross && matrix.target != 'universal-apple-darwin'"
        run: cargo build --release --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
      - name: Build macOS universal
        if: matrix.target == 'universal-apple-darwin'
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/env_guard_app target/x86_64-apple-darwin/release/env_guard_app target/aarch64-apple-darwin/release/env_guard_app
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/env_guard_app
      - name: Verify static
        if: contains(matrix.target, 'linux-musl')
        run: |
          result=$(ldd target/${{ matrix.target }}/release/env_guard_app 2>&1 || true)
          if echo "$result" | grep -q "not a dynamic executable\|statically linked"; then
            echo "Success"
          else
            exit 1
          fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/env_guard_app*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten Artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -l dist
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
